version: '3.8'

services:
  antigravity2api:
    build: .
    container_name: antigravity2api-nodejs
    ports:
      - "127.0.0.1:8045:8045"
    environment:
      - API_KEY=${API_KEY:-sk-text}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key-change-this-in-production}
      - PROXY=${PROXY:-}
      - SYSTEM_INSTRUCTION=${SYSTEM_INSTRUCTION:-}
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-}
    volumes:
      - /opt/antigravity2api-data:/app/data
      - ./public/images:/app/public/images
      - ./.env:/app/.env
      - /opt/antigravity2api-data/config.json:/app/config.json
    restart: unless-stopped

networks:
  default:
    name: new-api_default
    external: true